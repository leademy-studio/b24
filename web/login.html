<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Leademy Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <main class="auth">
    <form class="auth-card" id="loginForm" autocomplete="on" novalidate>
      <div class="auth-brand">
        <img class="brand__logo" src="assets/logo.png" alt="Leademy" width="28" height="28">
        <span class="brand__name">Leademy</span>
      </div>

      <h1 class="auth-title">Вход в дашборд</h1>
      <p class="auth-sub">Войдите, чтобы открыть панель управления</p>

      <div class="auth-alert" id="authError" hidden>
        <span class="alert__dot"></span>
        <span class="alert__text">Введите логин и пароль</span>
      </div>

      <label class="auth-field">
        <span class="auth-label">Логин или e-mail</span>
        <input class="input" id="login" name="username" type="text" inputmode="email"
               placeholder="name@leademy.digital" autocomplete="username" required>
      </label>

      <label class="auth-field">
        <span class="auth-label">Пароль</span>
        <input class="input" id="password" name="password" type="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </label>

      <label class="auth-remember">
        <input type="checkbox" id="remember" checked>
        <span>Запомнить меня</span>
      </label>

      <button class="btn btn--primary auth-submit" type="submit">Войти</button>

      <p class="auth-foot muted">Прототип интерфейса · доступ по аккаунту Bitrix24</p>
    </form>
  </main>

  <script>
    // Реальная аутентификация: POST /api/login → сервер ставит HttpOnly-cookie сессии.
    (function () {
      var form = document.getElementById("loginForm");
      var err = document.getElementById("authError");
      var errText = err.querySelector(".alert__text");
      var btn = form.querySelector(".auth-submit");

      function showError(msg) {
        errText.textContent = msg;
        err.hidden = false;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var login = document.getElementById("login").value.trim();
        var pass = document.getElementById("password").value;
        var remember = document.getElementById("remember").checked;
        if (!login || !pass) {
          showError("Введите логин и пароль");
          return;
        }
        err.hidden = true;
        btn.disabled = true;
        fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ username: login, password: pass, remember: remember }),
        })
          .then(function (r) {
            if (r.ok) {
              location.replace("index.html");
              return null;
            }
            return r.json().catch(function () { return {}; }).then(function (d) {
              showError(d.error === "invalid_credentials" ? "Неверный логин или пароль" : "Не удалось войти");
              btn.disabled = false;
            });
          })
          .catch(function () {
            showError("Сеть недоступна, попробуйте ещё раз");
            btn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
