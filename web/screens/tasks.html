<div class="toolbar">
  <select class="select" id="tkService">
    <option value="">Все услуги</option>
    <option value="SEO">SEO</option>
    <option value="PPC">PPC</option>
    <option value="Поддержка">Поддержка</option>
    <option value="Прочее">Прочее</option>
  </select>
  <select class="select" id="tkStatus">
    <option value="">Любой статус</option>
    <option value="overdue">Просрочено</option>
    <option value="active">В работе</option>
    <option value="waiting">Ждёт</option>
  </select>
  <span class="spacer"></span>
  <input class="input" id="tkSearch" type="search" placeholder="Поиск по задаче…">
</div>

<div class="section">
  <div class="section__title">Сквозной список задач <span class="muted" id="tkCount"></span></div>
  <div class="table-card">
    <table class="table">
      <thead>
        <tr>
          <th>Задача</th>
          <th>Проект</th>
          <th>Услуга</th>
          <th>Ответственный</th>
          <th class="c">Дедлайн</th>
          <th class="c">Статус</th>
        </tr>
      </thead>
      <tbody id="tkBody">
        <tr><td colspan="6" class="muted">Загрузка…</td></tr>
      </tbody>
    </table>
  </div>
</div>
