<div class="page-body">

        <div class="kpi__value" id="finBudget" title="Сумма активных месячных подписок">—</div>
        <div class="kpi__label">Бюджеты / мес</div>
      </div>
      <div class="kpi">
        <div class="kpi__top">
          <svg class="kpi__ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
        </div>
        <div class="kpi__value" id="finPaid" title="Счета, переведённые в «оплачен» в этом месяце">—</div>
        <div class="kpi__label">Оплачено за месяц</div>
      </div>
      <div class="kpi kpi--alert">
        <div class="kpi__top">
          <svg class="kpi__ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

        <div class="kpi__value" id="finAwaiting">—</div>
        <div class="kpi__label">Ожидает оплаты</div>
      </div>
    </div>

    <!-- Подписки и оплаты по проектам -->
    <div class="section">
      <div class="section__title">Подписки и оплаты по проектам</div>
      <div class="table-card">
        <table class="table">
          <thead>
            <tr>
              <th>Проект</th>
              <th class="r">Бюджет / мес</th>
              <th class="r">Оплачено</th>
              <th class="c">Статус</th>

          </thead>
          <tbody id="finByProject">
            <tr><td colspan="4" class="muted">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  <!-- Лента платежей -->
  <aside class="events">
    <div class="events__title">Лента платежей</div>
    <div class="feed" id="finPayments">
      <div class="feed__item"><span class="feed__text muted">Загрузка…</span></div>
    </div>
  </aside>
