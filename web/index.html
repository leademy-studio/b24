<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leademy Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Авторизация серверная: requireAuth на бэкенде редиректит на /login.html. -->
</head>
<body>
  <div class="app">
    <!-- Сайдбар -->
    <aside class="sidebar">
      <div class="brand">
        <img class="brand__logo" src="assets/logo.png" alt="Leademy">
        <span class="brand__name">Leademy</span>
      </div>
      <nav class="nav" id="nav">
        <a class="nav__item" href="#overview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
          <span>Обзор</span>
        </a>
        <a class="nav__item" href="#project">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg>
          <span>Проекты</span>
        </a>
        <a class="nav__item" href="#tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Задачи</span>
        </a>
        <a class="nav__item" href="#conspects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6"/><path d="M9 17h4"/></svg>
          <span>Конспекты</span>
        </a>
        <a class="nav__item" href="#employees">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Сотрудники</span>
        </a>
        <a class="nav__item" href="#finances">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/><circle cx="18" cy="12" r="1"/></svg>
          <span>Финансы</span>
        </a>
        <a class="nav__item" href="#subscriptions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          <span>Подписки</span>
        </a>
        <a class="nav__item" href="#scheduler">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
          <span>Планировщик</span>
        </a>
      </nav>
    </aside>

    <!-- Контент -->
    <div class="content">
      <header class="appbar">
        <div class="appbar__left">
          <span class="appbar__title">Leademy Dashboard</span>
          <button class="selector" type="button" id="monthSelector">
            <span id="appMonth">Июнь 2026</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
        </div>
        <div class="appbar__right">
          <button class="iconbtn" type="button" title="Уведомления">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
          </button>
          <img class="avatar" id="logout" src="assets/avatar.png" alt="Профиль" title="Выйти">
        </div>
      </header>

      <main class="main" id="main" aria-busy="true">
        <div class="loader">Загрузка…</div>
      </main>
    </div>
  </div>

  <!-- Модалка создания задачи -->
  <div class="modal" id="taskModal" hidden>
    <div class="modal__overlay" id="taskModalOverlay"></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
      <div class="modal__head">
        <h3 class="modal__title" id="taskModalTitle">Новая задача</h3>
        <button class="modal__close" id="taskModalClose" type="button" aria-label="Закрыть">×</button>
      </div>
      <form id="taskForm" class="modal__body">
        <label class="field"><span class="field__label">Тип задачи</span>
          <select class="select" id="tmTemplate"></select></label>
        <label class="field"><span class="field__label">Название *</span>
          <input class="input" id="tmTitle" type="text" autocomplete="off" required></label>
        <label class="field"><span class="field__label">Проект</span>
          <select class="select" id="tmProject"></select></label>
        <label class="field"><span class="field__label">Родительская задача (услуга)</span>
          <select class="select" id="tmParent"><option value="">— без родителя —</option></select></label>
        <label class="field"><span class="field__label">Ответственный *</span>
          <select class="select" id="tmResponsible" required></select></label>
        <label class="field"><span class="field__label">Дедлайн</span>
          <input class="input" id="tmDeadline" type="datetime-local"></label>
        <!-- Динамические поля шаблона -->
        <div id="tmTplFields"></div>
        <!-- Свободное описание (для типа «Свободная задача») -->
        <label class="field" id="tmDescField"><span class="field__label">Описание</span>
          <textarea class="input" id="tmDescription" rows="3"></textarea></label>
        <!-- Предпросмотр собранного описания (для шаблонов) -->
        <div class="tpl-preview" id="tmPreviewWrap" hidden>
          <button type="button" class="tpl-preview__toggle" id="tmPreviewToggle">▸ Предпросмотр описания</button>
          <pre class="tpl-preview__body" id="tmPreview" hidden></pre>
        </div>
        <div class="modal__msg" id="tmMsg" hidden></div>
        <div class="modal__actions">
          <button class="btn btn--light" type="button" id="taskModalCancel">Отмена</button>
          <button class="btn btn--primary" type="submit" id="tmSubmit">Создать</button>
        </div>
      </form>
    </div>
  </div>

  <script src="metrics.js"></script>
  <script src="overview.js"></script>
  <script src="project.js"></script>
  <script src="finances.js"></script>
  <script src="tasks.js"></script>
  <script src="subscriptions.js"></script>
  <script src="conspects.js"></script>
  <script src="taskmodal.js"></script>
  <script src="app.js"></script>
</body>
</html>
